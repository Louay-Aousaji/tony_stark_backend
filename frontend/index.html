<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c8a951" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>J.A.R.V.I.S.</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">J</div>
    <div class="header-titles">
      <h1>J.A.R.V.I.S.</h1>
      <p>Personal Morning Assistant · Munich</p>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot ready" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>

  <!-- Conversation -->
  <div class="conversation" id="conversation"></div>

  <!-- Controls -->
  <div class="controls">

    <!-- Quick buttons -->
    <div class="quick-buttons">
      <button class="quick-btn" id="btnMorning">
        <span class="icon">☀️</span> Morning Briefing
      </button>
      <button class="quick-btn" id="btnWeather">
        <span class="icon">🌤</span> Weather
      </button>
      <button class="quick-btn" id="btnTransit">
        <span class="icon">🚇</span> Get Route
      </button>
      <button class="quick-btn" id="btnDisruptions">
        <span class="icon">⚠️</span> Disruptions
      </button>
    </div>

    <!-- Destination text input (shown when awaiting destination) -->
    <div class="dest-input-row hidden" id="destRow">
      <input
        class="dest-input"
        id="destInput"
        type="text"
        placeholder="e.g. Garching Forschungszentrum"
        autocomplete="off"
      />
      <button class="dest-submit" id="destSubmit">Go</button>
    </div>

    <!-- Mic -->
    <div class="mic-row">
      <button class="mic-btn" id="micBtn">🎙</button>
      <p class="mic-hint" id="micHint">Tap the mic and speak, or use the buttons above</p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
